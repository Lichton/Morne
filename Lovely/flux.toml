            else
                self.children.front.atlas = G.ASSET_ATLAS["morne_flux_hc_atlas"]
                self.children.front:set_sprite_pos({x= self:get_id()-2, y=0})
            end
        end
    else
        if self and self.children and self.children.front then
            if not G.SETTINGS.colourblind_option then
                self.children.front.atlas = G.ASSET_ATLAS["morne_flux_atlas"]
                self.children.front:set_sprite_pos({x=13, y=0})
            else
                self.children.front.atlas = G.ASSET_ATLAS["morne_flux_hc_atlas"]
                self.children.front:set_sprite_pos({x=13, y=0})
            end
        end
    end
end
'''
